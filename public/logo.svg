<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Rolled carpet top -->
  <path d="M40 60 L40 110 Q40 130 60 130 L150 130 L160 125 L160 65 L150 60 Z" stroke="currentColor" stroke-width="7" stroke-linejoin="round" fill="none"/>
  <!-- Carpet roll arch -->
  <path d="M60 60 Q60 35 85 35 Q110 35 110 60" stroke="currentColor" stroke-width="7" stroke-linecap="round" fill="none"/>
  <!-- Inner carpet lines (weave detail) -->
  <line x1="80" y1="65" x2="80" y2="125" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <line x1="105" y1="65" x2="105" y2="125" stroke="currentColor" stroke-width="4" stroke-linecap="round"/>
  <!-- Fringe right -->
  <line x1="160" y1="75" x2="175" y2="75" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="90" x2="178" y2="90" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="160" y1="105" x2="175" y2="105" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- Bottom rolled carpet -->
  <path d="M35 148 Q35 138 45 138 L155 138 Q165 138 165 148 Q165 162 155 165 L50 165 Q35 162 35 148 Z" stroke="currentColor" stroke-width="6" stroke-linejoin="round" fill="none"/>
  <!-- Bottom roll circle -->
  <circle cx="55" cy="155" r="10" stroke="currentColor" stroke-width="5" fill="none"/>
  <!-- Bottom fringe right -->
  <line x1="165" y1="143" x2="180" y2="143" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="165" y1="155" x2="182" y2="155" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <line x1="165" y1="163" x2="180" y2="163" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <!-- Inner curve on bottom roll -->
  <path d="M70 155 Q85 148 100 155" stroke="currentColor" stroke-width="4" stroke-linecap="round" fill="none"/>
</svg>
